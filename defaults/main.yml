---
# User-configurable defaults for the Chrony role.
# See meta/argument_specs.yml for full documentation.

# General settings
chrony_role_action: "all"
chrony_service_enabled: true
chrony_configure_logrotate: false
chrony_port_disabled: false
chrony_bind_cmd_address_enable: true
chrony_bind_cmd_addresses:
  - "127.0.0.1"
  - "::1"
chrony_run_test: false

# NTP source configuration
chrony_ntp_source_mode: "server"
chrony_ntp_servers:
  - "0.pool.ntp.org iburst minpoll 4 maxpoll 8"
  - "1.pool.ntp.org iburst minpoll 4 maxpoll 8"
  - "2.pool.ntp.org iburst minpoll 4 maxpoll 8"
  - "3.pool.ntp.org iburst minpoll 4 maxpoll 8"
chrony_maxdistance: 3.0
chrony_ntsdumpdir: "/var/lib/chrony"
chrony_num_minsources: 1
chrony_maxupdateskew: 100.0
chrony_makestep: "1.0 3"

# NOTE: driftfile and keyfile paths are set per-OS in vars/{os_family}.yml
# as internal variables: __chrony_driftfile_path, __chrony_keyfile_path

# Security
chrony_command_key_id: 1
chrony_default_access: "deny"
chrony_local_stratum_enable: false
chrony_local_stratum: 10
chrony_auth_settings:
  enable: false
  selectmode: "require"

# Leap seconds
chrony_leapsectz: "right/UTC"
chrony_leapsec_settings:
  mode: "slew"
  maxslewrate: 1000.0
  smoothtime: "400 0.001 leaponly"

# Logging
chrony_log_enable: true
chrony_logdir_path: "/var/log/chrony"
chrony_log_options: "measurements statistics tracking"
chrony_logchange: "0.5"

# Logrotate
chrony_logrotate_options:
  archive_directory_path: "/var/log/chrony/archive"
  frequency: "daily"
  count: 30
  missingok: true
  compress: true
  nocreate: true
  copytruncate: false
  dateext: true

# RTC — rtcautotrim is ONLY effective with rtcfile enabled (chrony docs)
chrony_rtc_settings:
  rtcsync_enable: true
  rtconutc_enable: true
  rtcfile_enable: false
  rtcfile_path: "/var/lib/chrony/rtc"
  rtcautotrim_enable: false
  rtcautotrim_interval: 30
  rtcdevice: ""

# Hardware timestamping
chrony_hardware_settings:
  enable_hw_timestamp: false
  hw_timestamp_interfaces: "*"
  refclock_enable: false
  refclock_pps: "/dev/pps0"
  refclock_precision: "1e-7"

# System performance
chrony_system_settings:
  dumpdir: "/var/lib/chrony"

chrony_temp_compensation:
  enable: false
  sensor_file: "/sys/class/thermal/thermal_zone0/temp"
  update_interval: 30
  config_file: "/etc/chrony/tempcomp"

# NTP client options
chrony_client_settings:
  use_dhcp: false
  dhcp_sourcedir: "/run/chrony-dhcp"
  initstepslew:
    threshold: 30
    enable: true
