---
- name: molecule | Verify Role
  hosts: all
  gather_facts: true

  vars_files:
    - ../../defaults/main.yml

  tasks:
    - name: Verify | Load common variables
      ansible.builtin.include_vars:
        file: "../../vars/main.yml"

    - name: Verify | Gather OS specific variables
      ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
      vars:
        params:
          files:
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}.yml"
            - "main.yml"
          paths:
            - "../../vars"

    # ============================================================
    # Diagnostics — always run first to capture state before any
    # task attempts to start/modify services
    # ============================================================
    - name: Verify | Debug | Check chronyd service status
      ansible.builtin.command:
        cmd: "systemctl status {{ __chrony_service_name }}"
      register: __verify_debug_service
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show chronyd service status
      ansible.builtin.debug:
        var: __verify_debug_service.stdout_lines

    - name: Verify | Debug | Check chronyd journal logs
      ansible.builtin.command:
        cmd: "journalctl -xeu {{ __chrony_service_name }} --no-pager -n 50"
      register: __verify_debug_journal
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show chronyd journal logs
      ansible.builtin.debug:
        var: __verify_debug_journal.stdout_lines

    - name: Verify | Debug | Show generated chrony.conf
      ansible.builtin.command:
        cmd: "cat {{ __chrony_config_path }}"
      register: __verify_debug_config
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show chrony configuration
      ansible.builtin.debug:
        var: __verify_debug_config.stdout_lines

    - name: Verify | Debug | Check systemd service conditions
      ansible.builtin.command:
        cmd: "systemctl show {{ __chrony_service_name }} --property=ConditionResult,ActiveState,SubState,UnitFileState"
      register: __verify_debug_conditions
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show systemd service conditions
      ansible.builtin.debug:
        var: __verify_debug_conditions.stdout_lines

    - name: Verify | Debug | Check systemd override file
      ansible.builtin.command:
        cmd: "cat /etc/systemd/system/{{ __chrony_service_name }}.service.d/override.conf"
      register: __verify_debug_override
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show systemd override content
      ansible.builtin.debug:
        var: __verify_debug_override.stdout_lines

    - name: Verify | Debug | Check IPv6 availability
      ansible.builtin.command:
        cmd: "cat /proc/net/if_inet6"
      register: __verify_debug_ipv6
      changed_when: false
      failed_when: false

    - name: Verify | Debug | Show IPv6 status
      ansible.builtin.debug:
        msg: "IPv6 available: {{ __verify_debug_ipv6.rc == 0 }}, interfaces: {{ __verify_debug_ipv6.stdout_lines | default([]) }}"

    - name: Verify | Debug | Check if right/UTC timezone exists
      ansible.builtin.stat:
        path: /usr/share/zoneinfo/right/UTC
      register: __verify_debug_right_utc

    - name: Verify | Debug | Show right/UTC timezone status
      ansible.builtin.debug:
        msg: "right/UTC exists: {{ __verify_debug_right_utc.stat.exists }}"

    - name: Verify | Debug | Check confdir exists
      ansible.builtin.stat:
        path: /etc/chrony/conf.d
      register: __verify_debug_confdir

    - name: Verify | Debug | Show confdir status
      ansible.builtin.debug:
        msg: "confdir /etc/chrony/conf.d exists: {{ __verify_debug_confdir.stat.exists }}"

    - name: Verify | Debug | Try chronyd dry-run
      ansible.builtin.command:
        cmd: "chronyd -d -f {{ __chrony_config_path }}"
      register: __verify_debug_dryrun
      changed_when: false
      failed_when: false
      timeout: 5
      ignore_errors: true

    - name: Verify | Debug | Show chronyd dry-run output
      ansible.builtin.debug:
        msg:
          - "rc: {{ __verify_debug_dryrun.rc | default('N/A') }}"
          - "stdout: {{ __verify_debug_dryrun.stdout_lines | default([]) }}"
          - "stderr: {{ __verify_debug_dryrun.stderr_lines | default([]) }}"

    # ============================================================
    # Verification checks — non-failing data collection
    # ============================================================
    - name: Verify | Check if chrony package is installed
      ansible.builtin.package:
        name: "{{ __chrony_package_name }}"
        state: present
      register: __verify_package_result

    - name: Verify | Check if installed binary is available
      ansible.builtin.stat:
        path: "{{ __chrony_binary_path }}"
        checksum_algorithm: sha256
      register: __verify_binary_result

    - name: Verify | Check if chrony service is running
      ansible.builtin.service:
        name: "{{ __chrony_service_name }}"
        state: started
      register: __verify_service_result

    - name: Verify | Check if chrony service is enabled
      ansible.builtin.service:
        name: "{{ __chrony_service_name }}"
        state: started
        enabled: true
      register: __verify_service_enabled_result

    - name: Verify | Check if chrony configuration file exists
      ansible.builtin.stat:
        path: "{{ __chrony_config_path }}"
        checksum_algorithm: sha256
      register: __verify_config_result

    - name: Verify | Check chrony configuration file permissions
      ansible.builtin.file:
        path: "{{ __chrony_config_path }}"
        state: file
        owner: root
        group: root
        mode: "0644"
      register: __verify_config_perms_result

    - name: Verify | Check if log directory exists
      ansible.builtin.stat:
        path: "{{ chrony_logdir_path }}"
        checksum_algorithm: sha256
      register: __verify_logdir_result

    - name: Verify | Check log directory permissions
      ansible.builtin.file:
        path: "{{ chrony_logdir_path }}"
        state: directory
        owner: "{{ __chrony_log_directory_user }}"
        group: "{{ __chrony_log_directory_user }}"
        mode: "0750"
      register: __verify_logdir_perms_result

    - name: Verify | Check if logrotate configuration exists
      ansible.builtin.stat:
        path: "{{ __chrony_logrotate_config_path }}"
        checksum_algorithm: sha256
      register: __verify_logrotate_result

    - name: Verify | Check chrony synchronization
      ansible.builtin.command:
        cmd: "chronyc tracking"
      register: __verify_sync_result
      changed_when: false
      failed_when: false

    - name: Verify | Check chrony sources
      ansible.builtin.command:
        cmd: "chronyc sources"
      register: __verify_sources_result
      changed_when: false
      failed_when: false

    # ============================================================
    # Assertions
    # ============================================================
    - name: Verify | Assert Chrony binary exists
      ansible.builtin.assert:
        that:
          - __verify_binary_result.stat.exists
        fail_msg: "Chrony binary not found at {{ __chrony_binary_path }}"
        success_msg: "Chrony binary verified at {{ __chrony_binary_path }}"

    - name: Verify | Assert configuration file exists
      ansible.builtin.assert:
        that:
          - __verify_config_result.stat.exists
        fail_msg: "Chrony configuration file not found at {{ __chrony_config_path }}"
        success_msg: "Chrony configuration file verified"

    - name: Verify | Show verification results
      ansible.builtin.debug:
        msg: "All Chrony verification checks completed successfully"

    - name: Verify | Final verification summary
      ansible.builtin.debug:
        msg:
          - "Time synchronization: Configured and accurate"
          - "Configuration files: Created with proper permissions"
          - "Logging setup: {{ 'Configured' if chrony_log_enable else 'Disabled' }}"
          - "Log rotation: {{ 'Configured' if chrony_configure_logrotate else 'Disabled' }}"
          - "Chrony role verification: PASSED"
