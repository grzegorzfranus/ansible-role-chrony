---
- name: molecule | Verify Role
  hosts: all
  gather_facts: true

  vars_files:
    - ../../defaults/main.yml

  tasks:
    - name: Verify | Load common variables
      ansible.builtin.include_vars:
        file: "../../vars/main.yml"

    - name: Verify | Gather OS specific variables
      ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
      vars:
        params:
          files:
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
            - "{{ ansible_facts['distribution'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
            - "{{ ansible_facts['os_family'] | lower }}.yml"
            - "main.yml"
          paths:
            - "../../vars"

    - name: Verify | Check if chrony package is installed
      ansible.builtin.package:
        name: "{{ __chrony_package_name }}"
        state: present
      register: __verify_package_result

    - name: Verify | Check if installed binary is available
      ansible.builtin.stat:
        path: "{{ __chrony_binary_path }}"
        checksum_algorithm: sha256
      register: __verify_binary_result

    - name: Verify | Check if chrony configuration file exists
      ansible.builtin.stat:
        path: "{{ __chrony_config_path }}"
        checksum_algorithm: sha256
      register: __verify_config_result

    - name: Verify | Check chrony configuration file permissions
      ansible.builtin.file:
        path: "{{ __chrony_config_path }}"
        state: file
        owner: root
        group: root
        mode: "0644"
      register: __verify_config_perms_result

    - name: Verify | Check if log directory exists
      ansible.builtin.stat:
        path: "{{ chrony_logdir_path }}"
        checksum_algorithm: sha256
      register: __verify_logdir_result

    - name: Verify | Check log directory permissions
      ansible.builtin.file:
        path: "{{ chrony_logdir_path }}"
        state: directory
        owner: "{{ __chrony_log_directory_user }}"
        group: "{{ __chrony_log_directory_user }}"
        mode: "0750"
      register: __verify_logdir_perms_result

    - name: Verify | Check if logrotate configuration exists
      ansible.builtin.stat:
        path: "{{ __chrony_logrotate_config_path }}"
        checksum_algorithm: sha256
      register: __verify_logrotate_result

    # --- Diagnostics block (always runs before service assertions) ---

    - name: Verify | DEBUG | Check if chrony service is active
      ansible.builtin.command: systemctl is-active chrony.service
      register: __verify_chrony_is_active
      changed_when: false
      failed_when: false

    - name: Verify | DEBUG | Get systemctl status chrony
      ansible.builtin.command: systemctl status chrony.service --no-pager -l
      register: __verify_chrony_status
      changed_when: false
      failed_when: false

    - name: Verify | DEBUG | Get journalctl for chrony
      ansible.builtin.command: journalctl -xeu chrony.service --no-pager -n 100
      register: __verify_chrony_journal
      changed_when: false
      failed_when: false

    - name: Verify | DEBUG | Get chronyd dry-run output
      ansible.builtin.command: chronyd -p
      register: __verify_chrony_dryrun
      changed_when: false
      failed_when: false

    - name: Verify | DEBUG | Show deployed chrony.conf
      ansible.builtin.command: cat {{ __chrony_config_path }}
      register: __verify_chrony_conf
      changed_when: false
      failed_when: false

    - name: Verify | DEBUG | Check if /dev/rtc exists
      ansible.builtin.stat:
        path: /dev/rtc
      register: __verify_rtc_check

    - name: Verify | DEBUG | Print virtualization type
      ansible.builtin.debug:
        msg: >-
          virtualization_type={{ ansible_facts['virtualization_type'] | default('N/A') }}
          virtualization_role={{ ansible_facts['virtualization_role'] | default('N/A') }}
          /dev/rtc exists={{ __verify_rtc_check.stat.exists | default(false) }}

    - name: Verify | DEBUG | Print systemctl status
      ansible.builtin.debug:
        msg: "{{ __verify_chrony_status.stdout_lines | default([]) + __verify_chrony_status.stderr_lines | default([]) }}"

    - name: Verify | DEBUG | Print journalctl output
      ansible.builtin.debug:
        msg: "{{ __verify_chrony_journal.stdout_lines | default([]) }}"

    - name: Verify | DEBUG | Print chronyd dry-run (config validation)
      ansible.builtin.debug:
        msg: "{{ __verify_chrony_dryrun.stdout_lines | default([]) + __verify_chrony_dryrun.stderr_lines | default([]) }}"

    - name: Verify | DEBUG | Print deployed chrony.conf
      ansible.builtin.debug:
        msg: "{{ __verify_chrony_conf.stdout_lines | default([]) }}"

    # --- Assertions ---

    - name: Verify | Assert Chrony binary exists
      ansible.builtin.assert:
        that:
          - __verify_binary_result.stat.exists
        fail_msg: "Chrony binary not found at {{ __chrony_binary_path }}"
        success_msg: "Chrony binary verified at {{ __chrony_binary_path }}"

    - name: Verify | Assert configuration file exists
      ansible.builtin.assert:
        that:
          - __verify_config_result.stat.exists
        fail_msg: "Chrony configuration file not found at {{ __chrony_config_path }}"
        success_msg: "Chrony configuration file verified"

    - name: Verify | Assert chrony service is running
      ansible.builtin.assert:
        that:
          - __verify_chrony_is_active.rc == 0
        fail_msg: >-
          Chrony service is not running (is-active rc={{ __verify_chrony_is_active.rc }},
          stdout={{ __verify_chrony_is_active.stdout | default('') }}).
          Check diagnostic output above for details.
        success_msg: "Chrony service is active and running"

    - name: Verify | Check chrony synchronization
      ansible.builtin.command: chronyc tracking
      register: __verify_sync_result
      changed_when: false

    - name: Verify | Check chrony sources
      ansible.builtin.command: chronyc sources
      register: __verify_sources_result
      changed_when: false

    - name: Verify | Final verification summary
      ansible.builtin.debug:
        msg:
          - "Time synchronization: Configured and accurate"
          - "Configuration files: Created with proper permissions"
          - "Logging setup: {{ 'Configured' if chrony_log_enable else 'Disabled' }}"
          - "Log rotation: {{ 'Configured' if chrony_configure_logrotate else 'Disabled' }}"
          - "Chrony role verification: PASSED"

