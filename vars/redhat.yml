---
# =============================================================================
# Ansible Role: Chrony - RedHat Variables
# =============================================================================
# RedHat-specific variables.
# These are NOT user-overridable. All use double-underscore prefix per CoP §3.1.4.
# =============================================================================

# Service names
__chrony_service_name: "chronyd"
__chrony_ntp_service_name: "ntpd"
__chrony_timesyncd_service_name: "systemd-timesyncd"

# File paths and permissions
__chrony_config_path: "/etc/chrony.conf"
__chrony_log_directory_user: "chrony"
__chrony_driftfile_path: "/var/lib/chrony/drift"
__chrony_keyfile_path: "/etc/chrony.keys"
__chrony_binary_path: "/usr/sbin/chronyd"
__chrony_confdir_path: "/etc/chrony.d"
