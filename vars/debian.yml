---
# Debian-specific variables (internal, not user-configurable)

# Service names
__chrony_service_name: "chrony"
__chrony_ntp_service_name: "ntp"
__chrony_timesyncd_service_name: "systemd-timesyncd"

# File paths and permissions
__chrony_config_path: "/etc/chrony/chrony.conf"
# Debian uses '_chrony' instead of 'chrony' for the service user
__chrony_log_directory_user: "_chrony"
__chrony_driftfile_path: "/var/lib/chrony/chrony.drift"
__chrony_keyfile_path: "/etc/chrony/chrony.keys"
__chrony_binary_path: "/usr/sbin/chronyd"
__chrony_confdir_path: "/etc/chrony/conf.d"
